  <div id="atk-say"></div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      new Say({
        supabaseUrl: 'https://xxxxxxxxxxxxx.supabase.co',
        supabaseAnonKey: 'JtaOqoOq',
        pageSize: 10,
        loadImg: ''
      });
    });
